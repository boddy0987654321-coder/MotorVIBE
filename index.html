<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotorVIBE - Ultimate Automotive Experience</title>
    
    <!-- Link-uri CSS -->
    <link rel="preload" href="style.css" as="style">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
  
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader-content">
            <div class="loader-car"><i class="fas fa-car"></i></div>
            <h2>MotorVIBE</h2>
            <div class="loading-bar"><div class="loading-progress"></div></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-car-side"></i>
                <span>MotorVIBE</span>
            </div>
            
            <!-- Navigation will be generated by JS -->
            <div id="navMenu" class="nav-menu"></div>

            <div class="nav-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Caută mașini..." id="searchInput">
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>

            <div class="nav-hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu"></div>

    <!-- Main Content Container (all sections will be inserted here by JS) -->
    <main id="mainContent"></main>

    <!-- Modals -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeVideoModal()">&times;</span>
            <div class="video-container">
                <div class="video-placeholder">
                    <i class="fas fa-play-circle"></i>
                    <p>Video Presentation Coming Soon</p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="carModal" class="modal">
        <div class="modal-content car-modal-content">
            <span class="close-modal" onclick="closeCarModal()">&times;</span>
            <div id="carModalBody"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer" id="footer"></footer>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
